syntax = "proto3";

package retail.products.v1;

option java_multiple_files = true;
option java_package = "com.apptorise.retail.admin.protos.v1";
option java_outer_classname = "ProductProto";

service ProductService {
  rpc CreateProduct (CreateProductRequest) returns (ProductResponse);
  rpc GenerateProductContent (GenerateProductContentRequest) returns (GenerateProductContentResponse);
}

message CreateProductRequest {
  string name = 1;
  string sku = 2;
  double purchase_price = 3;
  double retail_price = 4;
  int32 stock_quantity = 5;
  string description = 6;
  repeated string image_uris = 7;
}

message ProductResponse {
  string product_id = 1;
  string name = 2;
  string sku = 3;
  double retail_price = 4;
  int32 stock_quantity = 5;
}

message GenerateProductContentRequest {
  repeated bytes images = 1;
  repeated string existing_image_uris = 2;
  string refinement_instructions = 3;
}

message GenerateProductContentResponse {
  string name = 1;
  string description = 2;
  repeated string temporary_image_uris = 3;
}